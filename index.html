const today=new Date();
function daysUntil(d){return Math.floor((new Date(d)-today)/86400000);}
function fmtDate(d){if(!d)return"-";return new Date(d).toLocaleDateString("he-IL");}
function addYear(d){if(!d)return"";const dt=new Date(d);dt.setFullYear(dt.getFullYear()+1);return dt.toISOString().split("T")[0];}

function pStatus(p){
  if(!p.has_file&&!p.file_url)return"red";
  const d=daysUntil(p.expiry);
  return d<0?"red":d<=WARNING_DAYS?"orange":"green";
}
function workerStatus(w){
  const mandatory=MANDATORY_PERMITS.map(type=>{
    const p=(w.permits||[]).find(pp=>pp.type===type);
    return p?pStatus(p):"red";
  });
  if(mandatory.includes("red"))return"red";
  const all=(w.permits||[]).map(pStatus);
  if(all.includes("red"))return"red";
  if(mandatory.includes("orange")||all.includes("orange"))return"orange";
  return"green";
}
function entityStatus(permits){
  if(!permits||!permits.length)return"orange";
  const s=permits.map(pStatus);
  return s.includes("red")?"red":s.includes("orange")?"orange":"green";
}

function exportToExcel(workers,contractors,filename){
  if(!workers.length){alert("אין נתונים לייצוא");return;}
  const rows=workers.map(w=>{

  });
  const h=Object.keys(rows[0]);
  const csv=["\uFEFF"+h.join(","),...rows.map(r=>h.map(k=>'"'+(r[k]||"").toString().replace(/"/g,'""')+'"').join(","))];
  const blob=new Blob([csv.join("\n")],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=(filename||"עובדים")+".csv";a.click();URL.revokeObjectURL(url);
}

function Buildings({buildings,setBuildings,canEdit}){
  const [filter,setFilter]=useState(null);
  const [sel,setSel]=useState(null);
  const [addingB,setAddingB]=useState(false);
  const [addingP,setAddingP]=useState(false);
  const [newBName,setNewBName]=useState("");
  const [toast,setToast]=useState(null);
  const [pForm,setPForm]=useState({type:"כריזה",customType:"",inspDate:"",expiry:"",notes:"",file:null});
  const showT=(m,t)=>{setToast({m,t});setTimeout(()=>setToast(null),3000);};
  const counts={green:0,orange:0,red:0};
  buildings.forEach(b=>counts[entityStatus(b.permits)]++);
  const list=filter?buildings.filter(b=>entityStatus(b.permits)===filter):buildings;

  async function addBuilding(){
    if(!newBName.trim())return;
    const{data,error}=await sb.from("buildings").insert([{name:newBName.trim()}]).select();
    if(error){alert(error.message);return;}
    setBuildings(prev=>[...prev,{...data[0],permits:[]}]);
    setNewBName("");setAddingB(false);showT("✅ מבנה נוסף!","success");
  }

  async function addPermit(){
    const type=pForm.type==="אחר"?pForm.customType:pForm.type;
    if(!type||!pForm.expiry){alert("נא למלא סוג ותוקף");return;}
    if(!pForm.file){alert("חובה לצרף מסמך");return;}
    let fileUrl=null;
    const ext=pForm.file.name.split(".").pop();
    const path=sel.id+"/"+type+"_"+Date.now()+"."+ext;
    const{error:upErr}=await sb.storage.from("permits").upload(path,pForm.file,{upsert:true});
    if(!upErr){const{data:ud}=sb.storage.from("permits").getPublicUrl(path);fileUrl=ud.publicUrl;}

    React.createElement("h2",{style:{fontSize:20,fontWeight:900,color:"#0f172a",marginBottom:16}},"📊 דוחות והתראות"),

        React.createElement("div",{style:{fontSize:11,color:"#64748b",marginTop:3,fontWeight:600}},s.label)

      ),

// ─────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [contractors,setContractors]=useState([]);
  const [workers,setWorkers]=useState([]);
  const [buildings,setBuildings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [searchId,setSearchId]=useState("");
  const [searchResult,setSearchResult]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);loadProfile(session.user.id);}
      else setLoading(false);
    });
  },[]);

  async function loadProfile(uid){
    const{data:prof}=await sb.from("user_profiles").select("*").eq("id",uid).single();
    setProfile(prof);await loadData(prof);
  }

  async function loadData(prof){
    const[{data:c},{data:w},{data:p},{data:b},{data:bp}]=await Promise.all([
      sb.from("contractors").select("*").order("created_at"),
      sb.from("workers").select("*").order("created_at"),
      sb.from("permits").select("*").eq("archived",false),
      sb.from("buildings").select("*").order("name"),
      sb.from("permits").select("*").eq("entity_type","building").eq("archived",false)
    ]);
    if(c)setContractors(c);
    if(w&&p){
      let wList=(w||[]).map(ww=>({...ww,permits:(p||[]).filter(pp=>pp.entity_type==="worker"&&pp.entity_id===ww.id)}));
      if(prof?.role==="contractor")wList=wList.filter(ww=>ww.contractor_id===prof.contractor_id);
      setWorkers(wList);
    }
    if(b&&b.length>0){
      setBuildings(b.map(bl=>({...bl,permits:(bp||[]).filter(pp=>pp.entity_id===bl.id)})));
    } else {
      const{data:seeded}=await sb.from("buildings").insert(DEFAULT_BUILDINGS.map(name=>({name}))).select();
      if(seeded)setBuildings(seeded.map(bl=>({...bl,permits:[]})));
    }
    setLoading(false);
  }

  function handleLogin(u,p){setUser(u);setProfile(p);loadData(p);}
  async function logout(){await sb.auth.signOut();setUser(null);setProfile(null);setTab("dashboard");}

  function doSearch(){
    const w=workers.find(w=>w.tz===searchId.trim());
    if(w)setSearchResult(w);else alert("לא נמצא עובד עם תז: "+searchId);
  }

  if(!user&&!loading)return React.createElement(Login,{onLogin:handleLogin});
  if(loading)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:14,background:"#f5f7fa"}},
    React.createElement("div",{style:{width:44,height:44,border:"3px solid #e2e8f0",borderTop:"3px solid #2563eb",borderRadius:"50%",animation:"spin 1s linear infinite"}}),
    React.createElement("div",{style:{color:"#94a3b8",fontSize:13}})
  );

  const role=profile?.role||"viewer";
  const canEdit=role==="admin";
  const roleLabel={admin:"👑 מנהל",viewer:"👁 צופה",contractor:"🔨 קבלן"}[role];

  const tabs=[
    {id:"dashboard",icon:"🏠",label:"בית"},
    ...(role!=="contractor"?[{id:"buildings",icon:"🏢",label:"מבנים"}]:[]),
    {id:"workers",icon:"👷",label:"עובדים"},
    ...(canEdit?[{id:"contractors",icon:"🔨",label:"קבלנים"},{id:"reports",icon:"📊",label:"דוחות"}]:[]),
    {id:"occasional",icon:"⚡",label:"מזדמן"},
    {id:"spotcheck",icon:"🔍",label:"ביקורת"},
    ...(canEdit?[{id:"users",icon:"👥",label:"משתמשים"}]:[]),
  ];

  return React.createElement("div",{style:{minHeight:"100vh",background:"#f5f7fa",paddingBottom:76}},
    // Header
    React.createElement("div",{style:{background:"white",borderBottom:"1px solid #e8edf2",padding:"10px 16px",position:"sticky",top:0,zIndex:200,display:"flex",alignItems:"center",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}},
      React.createElement("div",{style:{width:34,height:34,background:"linear-gradient(135deg,#1d4ed8,#0284c7)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,boxShadow:"0 2px 8px rgba(29,78,216,.3)"}},"🛡"),
      React.createElement("div",{style:{flex:1,display:"flex",gap:6,alignItems:"center"}},
        React.createElement("input",{value:searchId,onChange:e=>setSearchId(e.target.value),onKeyDown:e=>e.key==="Enter"&&doSearch(),placeholder:"חיפוש עובד לפי תז...",style:{...inp,marginBottom:0,flex:1,padding:"8px 12px",fontSize:13,borderRadius:10}}),
        React.createElement("button",{onClick:doSearch,style:{...btnBlue,padding:"8px 12px",fontSize:13,flexShrink:0,borderRadius:10}},"🔍")
      ),
      React.createElement("div",{style:{fontSize:11,color:"#94a3b8",flexShrink:0}},roleLabel),
      React.createElement("button",{onClick:logout,style:{background:"#f1f5f9",border:"none",color:"#64748b",cursor:"pointer",padding:"6px 10px",borderRadius:8,fontSize:12,flexShrink:0}},"יציאה")
    ),

    // Content
    React.createElement("div",{style:{maxWidth:580,margin:"0 auto",padding:"14px 12px"}},
      tab==="dashboard"&&React.createElement(Dashboard,{buildings,workers,contractors,onTab:setTab,userRole:role}),
      tab==="buildings"&&React.createElement(Buildings,{buildings,setBuildings,canEdit}),
      tab==="workers"&&React.createElement(Workers,{workers,setWorkers,contractors,userRole:role,userContractorId:profile?.contractor_id}),
      tab==="contractors"&&React.createElement(Contractors,{contractors,setContractors,canEdit}),
      tab==="reports"&&React.createElement(Reports,{workers,contractors,buildings}),
      tab==="occasional"&&React.createElement(OccasionalWork),
      tab==="spotcheck"&&React.createElement(SpotCheck,{workers,contractors}),
      tab==="users"&&React.createElement(UsersPanel,{contractors})
    ),

    // Bottom Nav
    React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #e8edf2",display:"flex",zIndex:200,boxShadow:"0 -2px 10px rgba(0,0,0,.06)"}},
      tabs.map(t=>React.createElement("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"8px 2px 10px",background:"none",border:"none",color:tab===t.id?"#2563eb":"#94a3b8",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:tab===t.id?"2px solid #2563eb":"2px solid transparent",minWidth:0,transition:"all .15s"}},
        React.createElement("span",{style:{fontSize:17}},t.icon),
        React.createElement("span",{style:{fontSize:9,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}},t.label)
      ))
    ),

    // Search Result Modal
    searchResult&&React.createElement(Modal,{title:"כרטיס עובד",onClose:()=>setSearchResult(null)},
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:12}},
        [["שם",searchResult.name],["תז",searchResult.tz],["קבלן",contractors.find(c=>c.id===searchResult.contractor_id)?.name||"-"],["פרויקט",searchResult.project||"-"]].map(([k,v])=>
          React.createElement("div",{key:k,style:{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 11px"}},
            React.createElement("div",{style:{color:"#94a3b8",fontSize:10,fontWeight:700}},k),
            React.createElement("div",{style:{color:"#0f172a",fontWeight:700,fontSize:13}},v)
          )
        )
      ),
      React.createElement(SBadge,{s:workerStatus(searchResult)}),
      React.createElement("button",{onClick:async()=>{
        const lines=[...MANDATORY_PERMITS,...OPTIONAL_PERMITS].map(type=>{const p=(searchResult.permits||[]).find(pp=>pp.type===type);return SC[p?pStatus(p):"red"].icon+" "+type+": "+(p?fmtDate(p.expiry):"חסר");}).join("\n");
        const ok=await sendEmail(MANAGER_EMAIL,"תיק בטיחות — "+searchResult.name,"תז: "+searchResult.tz+"\n\n"+lines);
        setSearchResult(null);alert(ok?"📧 נשלח!":"❌ שגיאה");
      },style:{...btnBlue,width:"100%",marginTop:12}},"📧 שלח תיק למייל")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
