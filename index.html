async function sendEmail(subject, message) {
  try {
    const r = await fetch("https://api.emailjs.com/api/v1.0/email/send",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({service_id:EMAILJS_SERVICE,template_id:EMAILJS_TEMPLATE,user_id:EMAILJS_KEY,
        template_params:{to_email:MANAGER_EMAIL,subject,message,from_name:"מערכת בטיחות קמפוס"}})
    });
    return r.status===200;
  } catch{return false;}
}

const today = new Date();
function daysUntil(d){return Math.floor((new Date(d)-today)/86400000);}
function pStatus(p){
  if(!p.has_file)return"red";
  const d=daysUntil(p.expiry);
  return d<0?"red":d<=60?"orange":"green";
}
function entityStatus(permits){
  if(!permits||!permits.length)return"green";
  const s=permits.map(pStatus);
  return s.includes("red")?"red":s.includes("orange")?"orange":"green";
}

const SC={
  green:{bg:"#0a2a1a",border:"#16a34a",text:"#4ade80",dot:"#22c55e",label:"תקין"},
  orange:{bg:"#2a1a00",border:"#d97706",text:"#fbbf24",dot:"#f59e0b",label:"פג בקרוב"},
  red:{bg:"#2a0a0a",border:"#dc2626",text:"#f87171",dot:"#ef4444",label:"דורש טיפול"},
};

const {useState,useEffect,useRef}=React;

function Dot({s,size=10}){
  return React.createElement("span",{style:{display:"inline-block",width:size,height:size,borderRadius:"50%",background:SC[s].dot,boxShadow:"0 0 8px "+SC[s].dot,flexShrink:0}});
}
function Badge({s}){
  return React.createElement("span",{style:{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 12px",borderRadius:20,background:SC[s].bg,border:"1px solid "+SC[s].border,color:SC[s].text,fontSize:12,fontWeight:600}},
    React.createElement(Dot,{s,size:7}),SC[s].label);
}

function Toast({msg}){
  if(!msg)return null;
  return React.createElement("div",{style:{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:"#0f2a1f",border:"1px solid #16a34a",color:"#4ade80",padding:"12px 24px",borderRadius:12,zIndex:9999,fontSize:14,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",whiteSpace:"nowrap"}},msg);
}

function Modal({title,onClose,children}){
  return React.createElement("div",{style:{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",padding:16},onClick:onClose},
    React.createElement("div",{style:{background:"#0d1526",border:"1px solid #1e2d4a",borderRadius:20,padding:24,maxWidth:520,width:"100%",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 25px 60px rgba(0,0,0,0.9)"},onClick:e=>e.stopPropagation()},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},

  workers.filter(w=>w.status==="active").forEach(w=>{const s=entityStatus(w.permits);wCounts[s]++;});

          React.createElement("div",{style:{fontSize:12,color:"#64748b",marginBottom:10}},item.title),
          React.createElement("div",{style:{display:"flex",gap:10}},
            ["green","orange","red"].map(s=>

                React.createElement("div",{style:{fontSize:22,fontWeight:800,color:SC[s].text}},item.counts[s]),
                React.createElement(Dot,{s,size:7})

            )

        )
      )

      React.createElement("div",{style:{fontSize:12,color:"#64748b",marginBottom:6}},"🔍 ביקורת פתע"),
      React.createElement("div",{style:{fontSize:28,fontWeight:800,color:"#60a5fa"}},[...new Set(workers.filter(w=>w.status==="active").map(w=>w.project))].length),

    ),
    alerts.length>0&&React.createElement("div",{style:{background:"#0d1526",border:"1px solid #1e2d4a",borderRadius:14,padding:16}},

          React.createElement(Dot,{s:a.status}),
          React.createElement("span",{style:{color:"#e2e8f0",fontSize:13,flex:1}},a.name+" — "+a.type),
          React.createElement("span",{style:{color:"#475569",fontSize:11}},a.expiry)
        )
      )
    )
  );
}

// ── Buildings ──
function Buildings({buildings,setBuildings}){
  const [filter,setFilter]=useState(null);
  const [sel,setSel]=useState(null);
  const counts={green:0,orange:0,red:0};
  buildings.forEach(b=>{counts[entityStatus(b.permits)]++;});
  const list=filter?buildings.filter(b=>entityStatus(b.permits)===filter):buildings;

  async function uploadFile(buildingId,permitType,file){
    const ext=file.name.split(".").pop();
    const path=buildingId+"/"+permitType+"."+ext;
    const{error}=await sb.storage.from("permits").upload(path,file,{upsert:true});
    if(error){alert("שגיאה בהעלאה: "+error.message);return null;}
    const{data}=sb.storage.from("permits").getPublicUrl(path);
    return data.publicUrl;
  }

  return React.createElement("div",null,
    React.createElement("h2",{style:{fontSize:20,fontWeight:800,color:"#f1f5f9",marginBottom:16}},"🏢 בטיחות מבנים"),
    React.createElement("div",{style:{display:"flex",gap:8,marginBottom:16}},
      ["green","orange","red"].map(s=>
        React.createElement("button",{key:s,onClick:()=>setFilter(filter===s?null:s),style:{flex:1,padding:"10px 6px",borderRadius:10,background:filter===s?SC[s].bg:"#0d1526",border:"2px solid "+(filter===s?SC[s].border:"#1e2d4a"),color:SC[s].text,fontWeight:800,fontSize:20,cursor:"pointer"}},
          counts[s],React.createElement("div",{style:{fontSize:10,fontWeight:400,marginTop:2}},SC[s].label)
        )
      )
    ),
    list.map(b=>{
      const st=entityStatus(b.permits);
      return React.createElement("div",{key:b.id,onClick:()=>setSel(b),style:{...card},
        onMouseEnter:e=>e.currentTarget.style.borderColor=SC[st].border,
        onMouseLeave:e=>e.currentTarget.style.borderColor="#1e2d4a"},
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
            React.createElement(Dot,{s:st}),
            React.createElement("span",{style:{color:"#e2e8f0",fontWeight:600}},b.name)
          ),
          React.createElement("div",{style:{display:"flex",gap:4}},b.permits.map((p,i)=>React.createElement(Dot,{key:i,s:pStatus(p),size:8})))
        )
      );
    }),
    sel&&React.createElement(Modal,{title:sel.name,onClose:()=>setSel(null)},
      sel.permits.map((p,i)=>{
        const st=pStatus(p);const d=daysUntil(p.expiry);
        return React.createElement("div",{key:i,style:{padding:"12px 14px",borderRadius:10,background:SC[st].bg,border:"1px solid "+SC[st].border,marginBottom:8}},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
            React.createElement("span",{style:{color:"#f1f5f9",fontWeight:700}},p.type),
            React.createElement(Badge,{s:st})
          ),
          React.createElement("div",{style:{fontSize:12,color:"#64748b"}},
            "תוקף: "+p.expiry+" · "+(d<0?"פג לפני "+Math.abs(d)+" ימים":d+" ימים נותרו")
          ),
          React.createElement("div",{style:{marginTop:8,display:"flex",gap:6,alignItems:"center"}},
            p.file_url
              ?React.createElement("a",{href:p.file_url,target:"_blank",style:{fontSize:12,color:"#60a5fa"}},"📄 צפה במסמך")
              :React.createElement("span",{style:{fontSize:12,color:"#ef4444"}},"❌ חסר מסמך"),
            React.createElement("label",{style:{fontSize:12,color:"#60a5fa",cursor:"pointer",marginRight:8}},
              "📎 העלה",
              React.createElement("input",{type:"file",accept:"image/*,.pdf",style:{display:"none"},
                onChange:async e=>{
                  const file=e.target.files[0];if(!file)return;
                  const url=await uploadFile(sel.id,p.type,file);
                  if(url){
                    await sb.from("permits").update({file_url:url,has_file:true}).eq("id",p.id);
                    setBuildings(prev=>prev.map(b=>b.id===sel.id?{...b,permits:b.permits.map((pp,ii)=>ii===i?{...pp,file_url:url,has_file:true}:pp)}:b));
                    setSel(prev=>({...prev,permits:prev.permits.map((pp,ii)=>ii===i?{...pp,file_url:url,has_file:true}:pp)}));
                  }
                }
              })
            )
          )
        );
      }),
      React.createElement("button",{onClick:async()=>{
        const lines=sel.permits.map(p=>(pStatus(p)==="green"?"✅ ":"❌ ")+p.type+": "+p.expiry).join("\n");
        const ok=await sendEmail("דוח בטיחות - "+sel.name,"מבנה: "+sel.name+"\n\n"+lines);
        setSel(null);alert(ok?"📧 נשלח!":"❌ שגיאה");
      },style:{...btnPrimary,marginTop:14,width:"100%"}},"📧 שלח דוח למייל")
    )
  );
}

// ── Workers ──
function Workers({workers,setWorkers,contractors}){
  const [search,setSearch]=useState("");
  const [archive,setArchive]=useState(false);
  const [sel,setSel]=useState(null);
  const [adding,setAdding]=useState(false);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState({tz:"",name:"",contractor_id:"",project:"",location:""});
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3000);};

  const list=workers.filter(w=>(archive?w.status==="archived":w.status==="active")&&(w.name.includes(search)||w.tz.includes(search)));

  async function addWorker(){
    if(!form.tz||!form.name||!form.contractor_id){alert("נא למלא שם, תז וקבלן");return;}
    const{data,error}=await sb.from("workers").insert([{tz:form.tz,name:form.name,contractor_id:form.contractor_id,project:form.project,location:form.location,status:"active"}]).select();
    if(error){alert("שגיאה: "+error.message);return;}
    setWorkers(prev=>[...prev,{...data[0],permits:[]}]);
    setForm({tz:"",name:"",contractor_id:"",project:"",location:""});
    setAdding(false);
    showToast("✅ עובד נוסף בהצלחה!");
  }

  async function archiveWorker(w){
    await sb.from("workers").update({status:"archived"}).eq("id",w.id);
    setWorkers(prev=>prev.map(ww=>ww.id===w.id?{...ww,status:"archived"}:ww));
    setSel(null);showToast("✅ עובד הועבר לארכיון");
  }
  async function restoreWorker(w){
    await sb.from("workers").update({status:"active"}).eq("id",w.id);
    setWorkers(prev=>prev.map(ww=>ww.id===w.id?{...ww,status:"active"}:ww));
    setSel(null);showToast("✅ עובד הוחזר לפעיל");
  }

  return React.createElement("div",null,
    React.createElement(Toast,{msg:toast}),
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      React.createElement("h2",{style:{fontSize:20,fontWeight:800,color:"#f1f5f9"}},"👷 עובדים"),
      React.createElement("button",{onClick:()=>setAdding(true),style:{...btnSuccess,padding:"8px 14px",fontSize:13}},"+ הוסף עובד")
    ),
    React.createElement("div",{style:{display:"flex",gap:8,marginBottom:12}},
      React.createElement("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"חיפוש לפי שם או תז...",style:{...inp,marginBottom:0,flex:1}}),
      React.createElement("button",{onClick:()=>setArchive(!archive),style:{padding:"10px 14px",borderRadius:10,background:archive?"#2a1a00":"#0d1526",border:"1px solid "+(archive?"#d97706":"#1e2d4a"),color:archive?"#fbbf24":"#94a3b8",fontSize:13,cursor:"pointer"}},archive?"🗂 ארכיון":"👥 פעילים")
    ),
    list.map(w=>{
      const st=entityStatus(w.permits);
      return React.createElement("div",{key:w.id,onClick:()=>setSel(w),style:card,
        onMouseEnter:e=>e.currentTarget.style.borderColor=SC[st].border,
        onMouseLeave:e=>e.currentTarget.style.borderColor="#1e2d4a"},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12}},
          React.createElement("div",{style:{width:42,height:42,borderRadius:12,background:"#1e2d4a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}},w.photo_url?"👷":"👷"),
          React.createElement("div",{style:{flex:1}},
            React.createElement("div",{style:{color:"#f1f5f9",fontWeight:700,fontSize:15}},w.name),
            React.createElement("div",{style:{color:"#475569",fontSize:12}},w.project||"לא שויך לפרויקט")
          ),
          React.createElement(Badge,{s:st})
        )
      );
    }),
    list.length===0&&React.createElement("div",{style:{color:"#334155",textAlign:"center",padding:30,fontSize:14}},"לא נמצאו עובדים"),

    adding&&React.createElement(Modal,{title:"הוספת עובד חדש",onClose:()=>setAdding(false)},
      React.createElement("input",{placeholder:"מספר תז *",value:form.tz,onChange:e=>setForm({...form,tz:e.target.value}),style:inp}),
      React.createElement("input",{placeholder:"שם מלא *",value:form.name,onChange:e=>setForm({...form,name:e.target.value}),style:inp}),
      React.createElement("select",{value:form.contractor_id,onChange:e=>setForm({...form,contractor_id:e.target.value}),style:{...inp,marginBottom:10}},
        React.createElement("option",{value:""},"בחר קבלן *"),
        contractors.map(c=>React.createElement("option",{key:c.id,value:c.id},c.name))
      ),
      React.createElement("input",{placeholder:"פרויקט",value:form.project,onChange:e=>setForm({...form,project:e.target.value}),style:inp}),
      React.createElement("input",{placeholder:"מיקום",value:form.location,onChange:e=>setForm({...form,location:e.target.value}),style:inp}),
      React.createElement("div",{style:{display:"flex",gap:8,marginTop:4}},
        React.createElement("button",{onClick:addWorker,style:{...btnSuccess,flex:1}},"✅ שמור"),
        React.createElement("button",{onClick:()=>setAdding(false),style:{...btnDanger,flex:1}},"ביטול")
      )
    ),

    sel&&React.createElement(Modal,{title:"כרטיס עובד – "+sel.name,onClose:()=>setSel(null)},
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}},
        [["תז",sel.tz],["קבלן",contractors.find(c=>c.id===sel.contractor_id)?.name||"-"],["פרויקט",sel.project||"-"],["מיקום",sel.location||"-"]].map(([k,v])=>
          React.createElement("div",{key:k,style:{background:"#0f1e35",border:"1px solid #1e2d4a",borderRadius:8,padding:"10px 12px"}},
            React.createElement("div",{style:{color:"#475569",fontSize:11}},k),
            React.createElement("div",{style:{color:"#e2e8f0",fontWeight:600,fontSize:13}},v)
          )
        )
      ),
      sel.permits.length>0&&React.createElement("div",null,
        React.createElement("div",{style:{color:"#64748b",fontSize:12,marginBottom:8,fontWeight:600}},"אישורים"),
        sel.permits.map((p,i)=>{
          const st=pStatus(p);
          return React.createElement("div",{key:i,style:{padding:"10px 12px",borderRadius:8,background:SC[st].bg,border:"1px solid "+SC[st].border,marginBottom:6}},
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              React.createElement("span",{style:{color:"#f1f5f9",fontSize:13,fontWeight:600}},p.type),
              React.createElement(Badge,{s:st})
            ),
            React.createElement("div",{style:{fontSize:12,color:"#475569",marginTop:4}},"תוקף: "+p.expiry+" · "+(p.has_file?"✅ מסמך קיים":"❌ חסר מסמך"))
          );
        })
      ),
      React.createElement("div",{style:{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}},
        React.createElement("button",{onClick:async()=>{
          const contractor=contractors.find(c=>c.id===sel.contractor_id)?.name||"";
          const lines=sel.permits.map(p=>(pStatus(p)==="green"?"✅ ":"❌ ")+p.type+": "+p.expiry).join("\n");
          const ok=await sendEmail("תיק בטיחות - "+sel.name+" - "+sel.tz,"שם: "+sel.name+"\nתז: "+sel.tz+"\nקבלן: "+contractor+"\nפרויקט: "+(sel.project||"-")+"\n\n"+lines);
          setSel(null);showToast(ok?"📧 תיק נשלח!":"❌ שגיאה");
        },style:{...btnPrimary,flex:1}},"📧 שלח תיק"),
        sel.status==="active"
          ?React.createElement("button",{onClick:()=>archiveWorker(sel),style:{...btnDanger,flex:1}},"📦 העבר לארכיון")
          :React.createElement("button",{onClick:()=>restoreWorker(sel),style:{...btnSuccess,flex:1}},"♻️ החזר לפעיל")
      )
    )
  );
}

// ── Contractors ──
function Contractors({contractors,setContractors}){
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({name:"",project:""});
  const [toast,setToast]=useState(null);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3000);};

  async function addContractor(){
    if(!form.name||!form.project){alert("נא למלא שם וסוג פרויקט");return;}
    const{data,error}=await sb.from("contractors").insert([{name:form.name,project:form.project,active:true}]).select();
    if(error){alert("שגיאה: "+error.message);return;}
    setContractors(prev=>[...prev,data[0]]);
    setForm({name:"",project:""});
    setAdding(false);
    showToast("✅ קבלן נוסף!");
  }

  return React.createElement("div",null,
    React.createElement(Toast,{msg:toast}),
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      React.createElement("h2",{style:{fontSize:20,fontWeight:800,color:"#f1f5f9"}},"🔨 קבלנים"),
      React.createElement("button",{onClick:()=>setAdding(true),style:{...btnSuccess,padding:"8px 14px",fontSize:13}},"+ הוסף קבלן")
    ),
    contractors.map(c=>
      React.createElement("div",{key:c.id,style:card},
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement("div",null,
            React.createElement("div",{style:{color:"#f1f5f9",fontWeight:700}},c.name),
            React.createElement("div",{style:{color:"#475569",fontSize:12,marginTop:2}},c.project)
          ),
          React.createElement("span",{style:{fontSize:11,padding:"3px 10px",borderRadius:20,background:c.active?"#0a2a1a":"#1e2d4a",border:"1px solid "+(c.active?"#16a34a":"#334155"),color:c.active?"#4ade80":"#64748b"}},c.active?"פעיל":"לא פעיל")
        )
      )
    ),
    adding&&React.createElement(Modal,{title:"הוספת קבלן חדש",onClose:()=>setAdding(false)},
      React.createElement("input",{placeholder:'שם חברה (למשל: א.ב. בנייה בע"מ) *',value:form.name,onChange:e=>setForm({...form,name:e.target.value}),style:inp}),
      React.createElement("input",{placeholder:"סוג פרויקט (למשל: שיפוץ בניין 3) *",value:form.project,onChange:e=>setForm({...form,project:e.target.value}),style:inp}),
      React.createElement("div",{style:{display:"flex",gap:8,marginTop:4}},
        React.createElement("button",{onClick:addContractor,style:{...btnSuccess,flex:1}},"✅ שמור"),
        React.createElement("button",{onClick:()=>setAdding(false),style:{...btnDanger,flex:1}},"ביטול")
      )
    )
  );
}

// ── SpotCheck ──
function SpotCheck({workers,contractors}){
  const [selProject,setSelProject]=useState(null);
  const projects=[...new Set(workers.filter(w=>w.status==="active").map(w=>w.project).filter(Boolean))];

  return React.createElement("div",null,
    React.createElement("h2",{style:{fontSize:20,fontWeight:800,color:"#f1f5f9",marginBottom:6}},"🔍 ביקורת פתע"),
    React.createElement("div",{style:{color:"#475569",fontSize:13,marginBottom:16}},"בחר פרויקט לביקורת מהירה"),
    projects.map(p=>
      React.createElement("div",{key:p,onClick:()=>setSelProject(selProject===p?null:p),style:{...card,background:selProject===p?"#0f2040":"#0d1526",borderColor:selProject===p?"#3b82f6":"#1e2d4a"}},
        React.createElement("div",{style:{color:"#f1f5f9",fontWeight:700}},"🔨 "+p)
      )
    ),
    selProject&&(()=>{
      const pw=workers.filter(w=>w.status==="active"&&w.project===selProject);
      return React.createElement("div",{style:{marginTop:8}},
        React.createElement("div",{style:{color:"#64748b",fontSize:13,marginBottom:10}},pw.length+" עובדים פעילים"),
        pw.map(w=>{
          const st=entityStatus(w.permits);
          return React.createElement("div",{key:w.id,style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:12,background:SC[st].bg,border:"1px solid "+SC[st].border,marginBottom:8}},
            React.createElement("div",{style:{width:44,height:44,borderRadius:12,background:"#1e2d4a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}},"👷"),
            React.createElement("div",{style:{flex:1}},
              React.createElement("div",{style:{color:"#f1f5f9",fontWeight:700,fontSize:15}},w.name),
              React.createElement("div",{style:{color:"#475569",fontSize:12}},"תז: "+w.tz)
            ),
            React.createElement(Badge,{s:st})
          );
        })
      );
    })()
  );
}

// ── Main App ──
function App(){
  const [tab,setTab]=useState("dashboard");
  const [contractors,setContractors]=useState([]);
  const [workers,setWorkers]=useState([]);
  const [buildings,setBuildings]=useState([
    {id:"b1",name:"בניין 1 - מינהל",permits:[{id:"p1",type:"כריזה",expiry:"2025-04-10",has_file:true,file_url:null},{id:"p2",type:"גילוי אש",expiry:"2025-08-01",has_file:true,file_url:null},{id:"p3",type:"מטף",expiry:"2025-02-01",has_file:false,file_url:null}]},
    {id:"b2",name:"בניין 2 - הנדסה",permits:[{id:"p4",type:"כריזה",expiry:"2025-06-20",has_file:true,file_url:null},{id:"p5",type:"גילוי אש",expiry:"2025-12-01",has_file:true,file_url:null},{id:"p6",type:"מטף",expiry:"2025-11-15",has_file:true,file_url:null}]},
    {id:"b3",name:"בניין 3 - מדעים",permits:[{id:"p7",type:"כריזה",expiry:"2025-03-25",has_file:true,file_url:null},{id:"p8",type:"גילוי אש",expiry:"2025-03-01",has_file:false,file_url:null},{id:"p9",type:"מטף",expiry:"2026-01-10",has_file:true,file_url:null}]},
    {id:"b4",name:"בניין 17 - ספרייה",permits:[{id:"p10",type:"כריזה",expiry:"2026-02-01",has_file:true,file_url:null},{id:"p11",type:"גילוי אש",expiry:"2025-10-15",has_file:true,file_url:null},{id:"p12",type:"מטף",expiry:"2025-09-30",has_file:true,file_url:null}]},
    {id:"b5",name:"בניין 19 - אומנויות",permits:[{id:"p13",type:"כריזה",expiry:"2025-01-15",has_file:false,file_url:null},{id:"p14",type:"גילוי אש",expiry:"2025-03-20",has_file:true,file_url:null},{id:"p15",type:"מטף",expiry:"2025-03-28",has_file:true,file_url:null}]},
  ]);
  const [loading,setLoading]=useState(true);
  const [searchId,setSearchId]=useState("");
  const [searchResult,setSearchResult]=useState(null);

  useEffect(()=>{
    async function load(){
      const{data:c}=await sb.from("contractors").select("*").order("created_at");
      const{data:w}=await sb.from("workers").select("*").order("created_at");
      const{data:p}=await sb.from("permits").select("*");
      if(c)setContractors(c);
      if(w&&p){
        const enriched=w.map(ww=>({...ww,permits:p.filter(pp=>pp.entity_type==="worker"&&pp.entity_id===ww.id)}));
        setWorkers(enriched);
      }
      setLoading(false);
    }
    load();
  },[]);

  function doSearch(){
    const w=workers.find(w=>w.tz===searchId.trim());
    if(w)setSearchResult(w);else alert("לא נמצא עובד עם תז זו");
  }

  const tabs=[
    {id:"dashboard",label:"🏠",title:"דשבורד"},
    {id:"buildings",label:"🏢",title:"מבנים"},
    {id:"workers",label:"👷",title:"עובדים"},
    {id:"contractors",label:"🔨",title:"קבלנים"},
    {id:"spotcheck",label:"🔍",title:"ביקורת"},
  ];

  if(loading)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}},
    React.createElement("div",{style:{width:48,height:48,border:"3px solid #1e2d4a",borderTop:"3px solid #3b82f6",borderRadius:"50%",animation:"spin 1s linear infinite"}}),
    React.createElement("div",{style:{color:"#475569",fontSize:14}},"טוען נתונים..."),
    React.createElement("style",null,"@keyframes spin{to{transform:rotate(360deg)}}")
  );

  return React.createElement("div",{style:{minHeight:"100vh",background:"#080c14",paddingBottom:80}},
    // Header
    React.createElement("div",{style:{background:"#0d1526",borderBottom:"1px solid #1e2d4a",padding:"12px 16px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("div",{style:{width:34,height:34,background:"linear-gradient(135deg,#1d4ed8,#0ea5e9)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"🛡"),
        React.createElement("div",null,
          React.createElement("div",{style:{fontWeight:800,fontSize:14,color:"#f1f5f9"}},"בטיחות קמפוס"),
          React.createElement("div",{style:{fontSize:10,color:"#334155"}},"עיריית ירושלים")
        )
      ),
      React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        React.createElement("input",{value:searchId,onChange:e=>setSearchId(e.target.value),onKeyDown:e=>e.key==="Enter"&&doSearch(),placeholder:"חיפוש תז...",style:{...inp,marginBottom:0,width:120,padding:"8px 12px",fontSize:13}}),
        React.createElement("button",{onClick:doSearch,style:{...btnPrimary,padding:"8px 12px",fontSize:13}},"🔍")
      )
    ),
    // Content
    React.createElement("div",{style:{maxWidth:640,margin:"0 auto",padding:16}},
      tab==="dashboard"&&React.createElement(Dashboard,{contractors,workers,buildings,onTab:setTab}),
      tab==="buildings"&&React.createElement(Buildings,{buildings,setBuildings}),
      tab==="workers"&&React.createElement(Workers,{workers,setWorkers,contractors}),
      tab==="contractors"&&React.createElement(Contractors,{contractors,setContractors}),
      tab==="spotcheck"&&React.createElement(SpotCheck,{workers,contractors})
    ),
    // Bottom Nav
    React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#0d1526",borderTop:"1px solid #1e2d4a",display:"flex",zIndex:100}},
      tabs.map(t=>
        React.createElement("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"10px 4px",background:"none",border:"none",color:tab===t.id?"#60a5fa":"#334155",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:tab===t.id?"2px solid #3b82f6":"2px solid transparent",transition:"all .2s"}},
          React.createElement("span",{style:{fontSize:18}},t.label),
          React.createElement("span",{style:{fontSize:10,fontWeight:tab===t.id?700:400}},t.title)
        )
      )
    ),
    // Search Result Modal
    searchResult&&React.createElement(Modal,{title:"כרטיס עובד – "+searchResult.name,onClose:()=>setSearchResult(null)},
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}},
        [["תז",searchResult.tz],["קבלן",contractors.find(c=>c.id===searchResult.contractor_id)?.name||"-"],["פרויקט",searchResult.project||"-"],["מיקום",searchResult.location||"-"]].map(([k,v])=>
          React.createElement("div",{key:k,style:{background:"#0f1e35",border:"1px solid #1e2d4a",borderRadius:8,padding:"10px 12px"}},
            React.createElement("div",{style:{color:"#475569",fontSize:11}},k),
            React.createElement("div",{style:{color:"#e2e8f0",fontWeight:600,fontSize:13}},v)
          )
        )
      ),
      React.createElement("button",{onClick:async()=>{
        const lines=searchResult.permits.map(p=>(pStatus(p)==="green"?"✅ ":"❌ ")+p.type+": "+p.expiry).join("\n")||"אין אישורים";
        const ok=await sendEmail("תיק בטיחות - "+searchResult.name,"תז: "+searchResult.tz+"\n\n"+lines);
        setSearchResult(null);alert(ok?"📧 נשלח!":"❌ שגיאה");
      },style:{...btnPrimary,width:"100%",marginTop:8}},"📧 שלח תיק למייל")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
