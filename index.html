async function sendEmail(to, subject, message) {
  try {
    const r = await fetch("https://api.emailjs.com/api/v1.0/email/send",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({service_id:EMAILJS_SERVICE,template_id:EMAILJS_TEMPLATE,user_id:EMAILJS_KEY,
        template_params:{to_email:to||MANAGER_EMAIL,subject,message,from_name:"מערכת בטיחות קמפוס"}})
    });
    return r.status===200;
  } catch{return false;}
}

const today = new Date();
function daysUntil(d){return Math.floor((new Date(d)-today)/86400000);}
function pStatus(p){
  if(!p.has_file&&!p.file_url)return"red";
  const d=daysUntil(p.expiry);
  return d<0?"red":d<=60?"orange":"green";
}
function entityStatus(permits){
  if(!permits||!permits.length)return"orange";
  const s=permits.map(pStatus);
  return s.includes("red")?"red":s.includes("orange")?"orange":"green";
}
function fmtDate(d){
  if(!d)return"-";
  return new Date(d).toLocaleDateString("he-IL");
}

// ── BUILDINGS ──
function Buildings({buildings,setBuildings,canEdit}){
  const [filter,setFilter]=useState(null);
  const [sel,setSel]=useState(null);
  const [addingBuilding,setAddingBuilding]=useState(false);
  const [addingPermit,setAddingPermit]=useState(false);
  const [newBuildingName,setNewBuildingName]=useState("");
  const [toast,setToast]=useState(null);
  const [pForm,setPForm]=useState({type:"כריזה",customType:"",inspectionDate:"",expiry:"",notes:"",file:null});
  const showToast=(m,t)=>{setToast({m,t});setTimeout(()=>setToast(null),3000);};

  const counts={green:0,orange:0,red:0};
  buildings.forEach(b=>counts[entityStatus(b.permits)]++);
  const list=filter?buildings.filter(b=>entityStatus(b.permits)===filter):buildings;

  async function addBuilding(){
    if(!newBuildingName.trim()){alert("נא להכניס שם מבנה");return;}
    const{data,error}=await sb.from("buildings").insert([{name:newBuildingName.trim()}]).select();
    if(error){alert("שגיאה: "+error.message);return;}
    setBuildings(prev=>[...prev,{...data[0],permits:[]}]);
    setNewBuildingName("");setAddingBuilding(false);
    showToast("✅ מבנה נוסף!");
  }

  async function addPermit(){
    const type=pForm.type==="אחר"?pForm.customType:pForm.type;
    if(!type||!pForm.expiry){alert("נא למלא סוג אישור ותוקף");return;}
    if(!pForm.file){alert("חובה לצרף מסמך/תמונה");return;}
    let fileUrl=null;
    const ext=pForm.file.name.split(".").pop();
    const path=sel.id+"/"+type+"_"+Date.now()+"."+ext;
    const{error:upErr}=await sb.storage.from("permits").upload(path,pForm.file,{upsert:true});
    if(!upErr){const{data:ud}=sb.storage.from("permits").getPublicUrl(path);fileUrl=ud.publicUrl;}

    // Archive old permit of same type
    const oldPermit=sel.permits.find(p=>p.type===type);
    if(oldPermit){
      await sb.from("permits").update({archived:true}).eq("id",oldPermit.id);
    }

    const{data,error}=await sb.from("permits").insert([{
      entity_type:"building",entity_id:sel.id,type,
      expiry:pForm.expiry,has_file:!!fileUrl,file_url:fileUrl,
      notes:pForm.notes,inspection_date:pForm.inspectionDate,archived:false
    }]).select();
    if(error){alert("שגיאה: "+error.message);return;}

    const newPermit=data[0];
    setBuildings(prev=>prev.map(b=>b.id===sel.id?{...b,permits:[...b.permits.filter(p=>p.type!==type),newPermit]}:b));
    setSel(prev=>({...prev,permits:[...prev.permits.filter(p=>p.type!==type),newPermit]}));
    setPForm({type:"כריזה",customType:"",inspectionDate:"",expiry:"",notes:"",file:null});
    setAddingPermit(false);
    showToast("✅ אישור נוסף!");
  }

  return React.createElement("div",{className:"fade-in"},
    toast&&React.createElement(Toast,{msg:toast.m,type:toast.t}),
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      React.createElement("h2",{style:{fontSize:19,fontWeight:900,color:"#f1f5f9"}},"🏢 בטיחות מבנים"),
      canEdit&&React.createElement("button",{onClick:()=>setAddingBuilding(true),style:{...btnS,padding:"7px 13px",fontSize:12}},"+ מבנה חדש")
    ),
    React.createElement("div",{style:{display:"flex",gap:7,marginBottom:14}},
      ["green","orange","red"].map(s=>React.createElement("button",{key:s,onClick:()=>setFilter(filter===s?null:s),style:{flex:1,padding:"9px 5px",borderRadius:10,background:filter===s?SC[s].bg:"#0b1320",border:"2px solid "+(filter===s?SC[s].border:"#1a2740"),color:SC[s].text,fontWeight:800,fontSize:18,cursor:"pointer"}},
        counts[s],React.createElement("div",{style:{fontSize:9,fontWeight:500,marginTop:1}},SC[s].label)
      ))
    ),
    list.map(b=>{
      const st=entityStatus(b.permits);
      return React.createElement("div",{key:b.id,onClick:()=>setSel(b),style:{...card,borderColor:"#1a2740"},
        onMouseEnter:e=>e.currentTarget.style.borderColor=SC[st].border,
        onMouseLeave:e=>e.currentTarget.style.borderColor="#1a2740"},
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:9}},
            React.createElement(Dot,{s:st}),
            React.createElement("span",{style:{color:"#e2e8f0",fontWeight:700,fontSize:14}},b.name)
          ),
          React.createElement("div",{style:{display:"flex",gap:5,alignItems:"center"}},
            b.permits.slice(0,4).map((p,i)=>React.createElement(Dot,{key:i,s:pStatus(p),size:7})),
            React.createElement("span",{style:{color:"#334155",fontSize:11,marginRight:4}},b.permits.length+" אישורים")
          )
        )
      );
    }),

    addingBuilding&&React.createElement(Modal,{title:"הוספת מבנה חדש",onClose:()=>setAddingBuilding(false)},
      React.createElement("input",{placeholder:"שם המבנה",value:newBuildingName,onChange:e=>setNewBuildingName(e.target.value),style:inp}),
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement("button",{onClick:addBuilding,style:{...btnS,flex:1}},"✅ הוסף"),
        React.createElement("button",{onClick:()=>setAddingBuilding(false),style:{...btnG,flex:1}},"ביטול")
      )
    ),

    sel&&React.createElement(Modal,{title:sel.name,onClose:()=>setSel(null),wide:true},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        React.createElement(Badge,{s:entityStatus(sel.permits)}),
        canEdit&&React.createElement("button",{onClick:()=>setAddingPermit(true),style:{...btnP,padding:"7px 13px",fontSize:12}},"+ הוסף אישור")
      ),
      sel.permits.length===0&&React.createElement("div",{style:{color:"#334155",textAlign:"center",padding:20,fontSize:13}},"אין אישורים עדיין"),
      sel.permits.map((p,i)=>{
        const st=pStatus(p);const d=daysUntil(p.expiry);
        return React.createElement("div",{key:i,style:{padding:"11px 13px",borderRadius:10,background:SC[st].bg,border:"1px solid "+SC[st].border,marginBottom:7}},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
            React.createElement("span",{style:{color:"#f1f5f9",fontWeight:800,fontSize:14}},p.type),
            React.createElement(Badge,{s:st})
          ),
          React.createElement("div",{style:{fontSize:12,color:"#475569",display:"flex",gap:12,flexWrap:"wrap"}},
            React.createElement("span",null,"תוקף: "+fmtDate(p.expiry)),
            React.createElement("span",null,d<0?"⛔ פג לפני "+Math.abs(d)+" ימים":d<=30?"🔴 "+d+" ימים":d<=60?"🟡 "+d+" ימים":"🟢 "+d+" ימים"),
            p.inspection_date&&React.createElement("span",null,"בדיקה: "+fmtDate(p.inspection_date)),
            p.file_url?React.createElement("a",{href:p.file_url,target:"_blank",style:{color:"#60a5fa",fontSize:12}},"📄 צפה במסמך"):React.createElement("span",{style:{color:"#ef4444"}},"❌ חסר מסמך")
          ),
          p.notes&&React.createElement("div",{style:{fontSize:11,color:"#475569",marginTop:4}},"הערות: "+p.notes)
        );
      }),
      canEdit&&React.createElement("button",{onClick:async()=>{
        const lines=sel.permits.map(p=>(pStatus(p)==="green"?"✅":"❌")+" "+p.type+": "+fmtDate(p.expiry)).join("\n");
        const ok=await sendEmail(MANAGER_EMAIL,"דוח בטיחות - "+sel.name,sel.name+"\n\n"+lines+"\n\nנשלח ממערכת בטיחות קמפוס");

  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [contractors,setContractors]=useState([]);
  const [workers,setWorkers]=useState([]);
  const [buildings,setBuildings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [searchId,setSearchId]=useState("");
  const [searchResult,setSearchResult]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);loadProfile(session.user.id);}
      else setLoading(false);
    });
  },[]);

  async function loadProfile(uid){
    const{data:prof}=await sb.from("user_profiles").select("*").eq("id",uid).single();
    setProfile(prof);
    await loadData(prof);
  }

  async function loadData(prof){
    const[{data:c},{data:w},{data:p},{data:b},{data:bp}]=await Promise.all([
      sb.from("contractors").select("*").order("created_at"),
      sb.from("workers").select("*").order("created_at"),
      sb.from("permits").select("*").eq("archived",false),
      sb.from("buildings").select("*").order("name"),
      sb.from("permits").select("*").eq("entity_type","building").eq("archived",false)
    ]);
    if(c)setContractors(c);
    if(w&&p){
      let wList=(w||[]).map(ww=>({...ww,permits:(p||[]).filter(pp=>pp.entity_type==="worker"&&pp.entity_id===ww.id)}));
      if(prof?.role==="contractor")wList=wList.filter(ww=>ww.contractor_id===prof.contractor_id);
      setWorkers(wList);
    }
    // Buildings
    let bList=[];
    if(b&&b.length>0){
      bList=b.map(bl=>({...bl,permits:(bp||[]).filter(pp=>pp.entity_id===bl.id)}));
    } else {
      // Seed default buildings
      const{data:seeded}=await sb.from("buildings").insert(DEFAULT_BUILDINGS.map(name=>({name}))).select();
      if(seeded)bList=seeded.map(bl=>({...bl,permits:[]}));
    }
    setBuildings(bList);
    setLoading(false);
  }

  function handleLogin(u,p){setUser(u);setProfile(p);loadData(p);}
  async function logout(){await sb.auth.signOut();setUser(null);setProfile(null);setTab("dashboard");}

  function doSearch(){
    const w=workers.find(w=>w.tz===searchId.trim());
    if(w)setSearchResult(w);else alert("לא נמצא עובד עם תז: "+searchId);
  }

  if(!user&&!loading)return React.createElement(Login,{onLogin:handleLogin});
  if(loading)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:14,background:"#060a12"}},
    React.createElement(Spinner),
    React.createElement("div",{style:{color:"#334155",fontSize:13}})
  );

  const role=profile?.role||"viewer";
  const canEdit=role==="admin";

  const tabs=[
    {id:"dashboard",icon:"🏠",label:"בית"},
    ...(role!=="contractor"?[{id:"buildings",icon:"🏢",label:"מבנים"}]:[]),
    {id:"workers",icon:"👷",label:"עובדים"},
    ...(canEdit?[{id:"contractors",icon:"🔨",label:"קבלנים"}]:[]),
    {id:"occasional",icon:"⚡",label:"מזדמן"},
    {id:"spotcheck",icon:"🔍",label:"ביקורת"},
    ...(canEdit?[{id:"users",icon:"👥",label:"משתמשים"}]:[]),
  ];

  return React.createElement("div",{style:{minHeight:"100vh",background:"#060a12",paddingBottom:72}},
    // Header
    React.createElement("div",{style:{background:"#0b1320",borderBottom:"1px solid #1a2740",padding:"10px 14px",position:"sticky",top:0,zIndex:200,display:"flex",alignItems:"center",gap:10}},
      React.createElement("div",{style:{width:32,height:32,background:"linear-gradient(135deg,#1d4ed8,#0ea5e9)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}},"🛡"),
      React.createElement("div",{style:{flex:1,display:"flex",gap:6,alignItems:"center"}},
        React.createElement("input",{value:searchId,onChange:e=>setSearchId(e.target.value),onKeyDown:e=>e.key==="Enter"&&doSearch(),placeholder:"חיפוש עובד לפי תז...",style:{...inp,marginBottom:0,flex:1,padding:"8px 12px",fontSize:13}}),
        React.createElement("button",{onClick:doSearch,style:{...btnP,padding:"8px 12px",fontSize:13,flexShrink:0}},"🔍")
      ),
      React.createElement("button",{onClick:logout,style:{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:12,flexShrink:0,padding:"4px 8px",borderRadius:6}},"יציאה")
    ),

    // Content
    React.createElement("div",{style:{maxWidth:600,margin:"0 auto",padding:"14px 12px"}},
      tab==="dashboard"&&React.createElement(Dashboard,{buildings,workers,contractors,onTab:setTab,userRole:role}),
      tab==="buildings"&&React.createElement(Buildings,{buildings,setBuildings,canEdit}),
      tab==="workers"&&React.createElement(Workers,{workers,setWorkers,contractors,userRole:role,userContractorId:profile?.contractor_id}),
      tab==="contractors"&&React.createElement(Contractors,{contractors,setContractors,canEdit}),
      tab==="occasional"&&React.createElement(OccasionalWork),
      tab==="spotcheck"&&React.createElement(SpotCheck,{workers,contractors}),
      tab==="users"&&React.createElement(UsersPanel,{contractors})
    ),

    // Bottom Nav
    React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#0b1320",borderTop:"1px solid #1a2740",display:"flex",zIndex:200}},
      tabs.map(t=>React.createElement("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"8px 2px",background:"none",border:"none",color:tab===t.id?"#60a5fa":"#334155",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:tab===t.id?"2px solid #3b82f6":"2px solid transparent",minWidth:0}},
        React.createElement("span",{style:{fontSize:16}},t.icon),
        React.createElement("span",{style:{fontSize:9,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}},t.label)
      ))
    ),

    // Search Result Modal
    searchResult&&React.createElement(Modal,{title:"כרטיס עובד – "+searchResult.name,onClose:()=>setSearchResult(null)},
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:12}},
        [["תז",searchResult.tz],["תפקיד",searchResult.role||"-"],["קבלן",contractors.find(c=>c.id===searchResult.contractor_id)?.name||"-"],["פרויקט",searchResult.project||"-"]].map(([k,v])=>
          React.createElement("div",{key:k,style:{background:"#0f1e35",border:"1px solid #1e2d4a",borderRadius:8,padding:"9px 11px"}},
            React.createElement("div",{style:{color:"#334155",fontSize:10,fontWeight:700}},k),
            React.createElement("div",{style:{color:"#e2e8f0",fontWeight:600,fontSize:13}},v)
          )
        )
      ),
      React.createElement(Badge,{s:entityStatus(searchResult.permits)}),
      React.createElement("button",{onClick:async()=>{
        const lines=searchResult.permits.map(p=>(pStatus(p)==="green"?"✅":"❌")+" "+p.type+": "+fmtDate(p.expiry)).join("\n")||"אין אישורים";
        const ok=await sendEmail(MANAGER_EMAIL,"תיק בטיחות - "+searchResult.name,"תז: "+searchResult.tz+"\n\n"+lines);
        setSearchResult(null);alert(ok?"📧 נשלח!":"❌ שגיאה");
      },style:{...btnP,width:"100%",marginTop:12}},"📧 שלח תיק למייל")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
