async function sendEmail(subject, message) {
  try {
    const r = await fetch("https://api.emailjs.com/api/v1.0/email/send",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({service_id:EMAILJS_SERVICE,template_id:EMAILJS_TEMPLATE,user_id:EMAILJS_KEY,
        template_params:{to_email:MANAGER_EMAIL,subject,message,from_name:"מערכת בטיחות קמפוס"}})
    });
    return r.status===200;
  } catch{return false;}
}

const today = new Date();
function daysUntil(d){return Math.floor((new Date(d)-today)/86400000);}
function pStatus(p){
  if(!p.has_file)return"red";
  const d=daysUntil(p.expiry);
  return d<0?"red":d<=60?"orange":"green";
}
function entityStatus(permits){
  if(!permits||!permits.length)return"green";
  const s=permits.map(pStatus);
  return s.includes("red")?"red":s.includes("orange")?"orange":"green";
}

// ── Login Screen ──
function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  async function login(){
    if(!email||!password){setError("נא למלא מייל וסיסמה");return;}
    setLoading(true);setError("");
    const{data,error:err}=await sb.auth.signInWithPassword({email,password});
    if(err){setError("מייל או סיסמה שגויים");setLoading(false);return;}
    const{data:profile}=await sb.from("user_profiles").select("*").eq("id",data.user.id).single();
    onLogin(data.user, profile);
    setLoading(false);
  }

  return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"#080c14"}},
    React.createElement("div",{style:{width:"100%",maxWidth:380,animation:"fadeIn .3s ease"}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:32}},
        React.createElement("div",{style:{width:64,height:64,background:"linear-gradient(135deg,#1d4ed8,#0ea5e9)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 16px"}},"🛡"),
        React.createElement("h1",{style:{fontSize:22,fontWeight:800,color:"#f1f5f9",marginBottom:4}},"מערכת בטיחות קמפוס"),
        React.createElement("div",{style:{color:"#475569",fontSize:13}},"עיריית ירושלים")
      ),
      React.createElement("div",{style:{background:"#0d1526",border:"1px solid #1e2d4a",borderRadius:20,padding:24}},
        error&&React.createElement("div",{style:{background:"#2a0a0a",border:"1px solid #dc2626",color:"#f87171",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}},error),
        React.createElement("input",{type:"email",placeholder:"כתובת מייל",value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==="Enter"&&login(),style:inp}),
        React.createElement("input",{type:"password",placeholder:"סיסמה",value:password,onChange:e=>setPassword(e.target.value),onKeyDown:e=>e.key==="Enter"&&login(),style:{...inp,marginBottom:16}}),
        React.createElement("button",{onClick:login,disabled:loading,style:{...btnPrimary,width:"100%",padding:"13px",fontSize:15,opacity:loading?.7:1}},

    if(!email){alert("נא להכניס מייל");return;}
    if(role==="contractor"&&!contractorId){alert("נא לבחור קבלן");return;}
    const{data,error}=await sb.auth.admin.inviteUserByEmail(email);

      showToast("⚠️ שליחת הזמנה נכשלה — הוסף ידנית ב-Supabase");

    if(data?.user?.id){
      await sb.from("user_profiles").insert([{id:data.user.id,email,role,contractor_id:role==="contractor"?contractorId:null,full_name:""}]);
    }
    setEmail("");setRole("viewer");setContractorId("");
    showToast("✅ הזמנה נשלחה!");

      React.createElement("input",{type:"email",placeholder:"כתובת מייל",value:email,onChange:e=>setEmail(e.target.value),style:inp}),
      React.createElement("select",{value:role,onChange:e=>setRole(e.target.value),style:{...inp}},
        Object.entries(roleLabels).map(([k,v])=>React.createElement("option",{key:k,value:k},v))
      ),
      role==="contractor"&&React.createElement("select",{value:contractorId,onChange:e=>setContractorId(e.target.value),style:{...inp}},
        React.createElement("option",{value:""},"בחר קבלן"),
        contractors.map(c=>React.createElement("option",{key:c.id,value:c.id},c.name))
      ),
      React.createElement("button",{onClick:inviteUser,style:{...btnPrimary,width:"100%"}},"📧 שלח הזמנה")
    ),
    React.createElement("div",{style:{background:"#0a1a0a",border:"1px solid #1a3a1a",borderRadius:12,padding:16}},
      React.createElement("div",{style:{fontWeight:600,color:"#4ade80",marginBottom:8,fontSize:13}},"💡 הוספה ידנית"),
      React.createElement("div",{style:{color:"#475569",fontSize:12,lineHeight:1.6}},
        "1. היכנס ל-Supabase → Authentication → Users",React.createElement("br"),
        "2. לחץ Add user → Create new user",React.createElement("br"),
        "3. הכנס מייל וסיסמה",React.createElement("br"),
        "4. העתק את ה-UID של המשתמש",React.createElement("br"),
        "5. הוסף ב-SQL Editor:",React.createElement("br"),
        React.createElement("code",{style:{fontSize:11,color:"#60a5fa",display:"block",marginTop:6,background:"#0f1e35",padding:8,borderRadius:6,direction:"ltr",textAlign:"left"}},
          "insert into user_profiles (id,email,role)\nvalues ('UID','email@x.com','viewer');"
        )
      )
    )
  );
}

// ── SpotCheck ──
function SpotCheck({workers,contractors}){
  const [selProject,setSelProject]=useState(null);
  const projects=[...new Set(workers.filter(w=>w.status==="active").map(w=>w.project).filter(Boolean))];

  return React.createElement("div",null,
    React.createElement("h2",{style:{fontSize:20,fontWeight:800,color:"#f1f5f9",marginBottom:6}},"🔍 ביקורת פתע"),
    React.createElement("div",{style:{color:"#475569",fontSize:13,marginBottom:16}},"בחר פרויקט"),
    projects.length===0&&React.createElement("div",{style:{color:"#334155",textAlign:"center",padding:30}},"אין פרויקטים פעילים"),
    projects.map(p=>
      React.createElement("div",{key:p,onClick:()=>setSelProject(selProject===p?null:p),style:{...card,background:selProject===p?"#0f2040":"#0d1526",borderColor:selProject===p?"#3b82f6":"#1e2d4a"}},
        React.createElement("div",{style:{color:"#f1f5f9",fontWeight:700}},"🔨 "+p)
      )
    ),
    selProject&&(()=>{
      const pw=workers.filter(w=>w.status==="active"&&w.project===selProject);
      return React.createElement("div",{style:{marginTop:8}},
        React.createElement("div",{style:{color:"#64748b",fontSize:13,marginBottom:10}},pw.length+" עובדים"),
        pw.map(w=>{
          const st=entityStatus(w.permits);
          return React.createElement("div",{key:w.id,style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:12,background:SC[st].bg,border:"1px solid "+SC[st].border,marginBottom:8}},
            React.createElement("div",{style:{width:44,height:44,borderRadius:12,background:"#1e2d4a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}},"👷"),
            React.createElement("div",{style:{flex:1}},
              React.createElement("div",{style:{color:"#f1f5f9",fontWeight:700,fontSize:15}},w.name),
              React.createElement("div",{style:{color:"#475569",fontSize:12}},"תז: "+w.tz)
            ),
            React.createElement(Badge,{s:st})
          );
        })
      );
    })()
  );
}

// ── Dashboard ──
function Dashboard({contractors,workers,buildings,onTab,userRole}){
  const bCounts={green:0,orange:0,red:0};
  buildings.forEach(b=>{bCounts[entityStatus(b.permits)]++;});
  const wCounts={green:0,orange:0,red:0};
  workers.filter(w=>w.status==="active").forEach(w=>{wCounts[entityStatus(w.permits)]++;});
  const alerts=buildings.flatMap(b=>b.permits.filter(p=>pStatus(p)!=="green").map(p=>({name:b.name,type:p.type,status:pStatus(p),expiry:p.expiry})));
  const roleLabel={admin:"👑 מנהל",viewer:"👁️ צופה",contractor:"🔨 קבלן"};

  return React.createElement("div",null,
    React.createElement("div",{style:{marginBottom:24}},
      React.createElement("h1",{style:{fontSize:22,fontWeight:800,color:"#f1f5f9",marginBottom:4}},"מרכז שליטה"),
      React.createElement("div",{style:{color:"#475569",fontSize:13}},"עיריית ירושלים · "+roleLabel[userRole])
    ),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
      userRole!=="contractor"&&React.createElement("div",{onClick:()=>onTab("buildings"),style:{...card,background:"linear-gradient(135deg,#0d1526,#111e38)"}},
        React.createElement("div",{style:{fontSize:12,color:"#64748b",marginBottom:8}},"🏢 מבנים"),
        React.createElement("div",{style:{display:"flex",gap:10}},["green","orange","red"].map(s=>
          React.createElement("div",{key:s,style:{textAlign:"center"}},
            React.createElement("div",{style:{fontSize:20,fontWeight:800,color:SC[s].text}},bCounts[s]),
            React.createElement(Dot,{s,size:7})
          )
        ))
      ),
      React.createElement("div",{onClick:()=>onTab("workers"),style:{...card,background:"linear-gradient(135deg,#0d1526,#111e38)"}},
        React.createElement("div",{style:{fontSize:12,color:"#64748b",marginBottom:8}},"👷 עובדים"),
        React.createElement("div",{style:{display:"flex",gap:10}},["green","orange","red"].map(s=>
          React.createElement("div",{key:s,style:{textAlign:"center"}},
            React.createElement("div",{style:{fontSize:20,fontWeight:800,color:SC[s].text}},wCounts[s]),
            React.createElement(Dot,{s,size:7})
          )
        ))
      )
    ),
    userRole==="admin"&&alerts.length>0&&React.createElement("div",{style:{background:"#0d1526",border:"1px solid #1e2d4a",borderRadius:14,padding:16}},
      React.createElement("div",{style:{fontWeight:700,color:"#f1f5f9",marginBottom:12,fontSize:14}},"⚠️ התראות פעילות"),
      alerts.slice(0,5).map((a,i)=>
        React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,background:SC[a.status].bg,border:"1px solid "+SC[a.status].border,marginBottom:6}},
          React.createElement(Dot,{s:a.status}),
          React.createElement("span",{style:{color:"#e2e8f0",fontSize:13,flex:1}},a.name+" — "+a.type),
          React.createElement("span",{style:{color:"#475569",fontSize:11}},a.expiry)
        )
      )
    )
  );
}

// ── Main App ──
function App(){
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [contractors,setContractors]=useState([]);
  const [workers,setWorkers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [buildings]=useState([
    {id:"b1",name:"בניין 1 - מינהל",permits:[{id:"p1",type:"כריזה",expiry:"2025-04-10",has_file:true},{id:"p2",type:"גילוי אש",expiry:"2025-08-01",has_file:true},{id:"p3",type:"מטף",expiry:"2025-02-01",has_file:false}]},
    {id:"b2",name:"בניין 2 - הנדסה",permits:[{id:"p4",type:"כריזה",expiry:"2025-06-20",has_file:true},{id:"p5",type:"גילוי אש",expiry:"2025-12-01",has_file:true},{id:"p6",type:"מטף",expiry:"2025-11-15",has_file:true}]},
    {id:"b3",name:"בניין 3 - מדעים",permits:[{id:"p7",type:"כריזה",expiry:"2025-03-25",has_file:true},{id:"p8",type:"גילוי אש",expiry:"2025-03-01",has_file:false},{id:"p9",type:"מטף",expiry:"2026-01-10",has_file:true}]},
    {id:"b4",name:"בניין 17 - ספרייה",permits:[{id:"p10",type:"כריזה",expiry:"2026-02-01",has_file:true},{id:"p11",type:"גילוי אש",expiry:"2025-10-15",has_file:true},{id:"p12",type:"מטף",expiry:"2025-09-30",has_file:true}]},
    {id:"b5",name:"בניין 19 - אומנויות",permits:[{id:"p13",type:"כריזה",expiry:"2025-01-15",has_file:false},{id:"p14",type:"גילוי אש",expiry:"2025-03-20",has_file:true},{id:"p15",type:"מטף",expiry:"2025-03-28",has_file:true}]},
  ]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){
        setUser(session.user);
        sb.from("user_profiles").select("*").eq("id",session.user.id).single().then(({data})=>{
          setProfile(data);
          loadData(data);
        });
      } else {
        setLoading(false);
      }
    });
  },[]);

  async function loadData(prof){
    const{data:c}=await sb.from("contractors").select("*").order("created_at");
    const{data:w}=await sb.from("workers").select("*").order("created_at");
    const{data:p}=await sb.from("permits").select("*");
    if(c)setContractors(c);
    if(w&&p){
      let workerList=w.map(ww=>({...ww,permits:(p||[]).filter(pp=>pp.entity_type==="worker"&&pp.entity_id===ww.id)}));
      if(prof?.role==="contractor")workerList=workerList.filter(ww=>ww.contractor_id===prof.contractor_id);
      setWorkers(workerList);
    }
    setLoading(false);
  }

  function handleLogin(u,p){setUser(u);setProfile(p);loadData(p);}

  async function handleLogout(){
    await sb.auth.signOut();
    setUser(null);setProfile(null);setTab("dashboard");
  }

  if(!user&&!loading)return React.createElement(LoginScreen,{onLogin:handleLogin});

  if(loading)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}},
    React.createElement("div",{style:{width:48,height:48,border:"3px solid #1e2d4a",borderTop:"3px solid #3b82f6",borderRadius:"50%",animation:"spin 1s linear infinite"}}),
    React.createElement("div",{style:{color:"#475569"}})
  );

  const role=profile?.role||"viewer";
  const canEdit=role==="admin";

  const tabs=[
    {id:"dashboard",label:"🏠",title:"דשבורד"},
    ...(role!=="contractor"?[{id:"buildings",label:"🏢",title:"מבנים"}]:[]),
    {id:"workers",label:"👷",title:"עובדים"},
    ...(canEdit?[{id:"contractors",label:"🔨",title:"קבלנים"},{id:"users",label:"👥",title:"משתמשים"}]:[]),
    {id:"spotcheck",label:"🔍",title:"ביקורת"},
  ];

  return React.createElement("div",{style:{minHeight:"100vh",background:"#080c14",paddingBottom:80}},
    React.createElement("div",{style:{background:"#0d1526",borderBottom:"1px solid #1e2d4a",padding:"12px 16px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("div",{style:{width:34,height:34,background:"linear-gradient(135deg,#1d4ed8,#0ea5e9)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"🛡"),
        React.createElement("div",null,
          React.createElement("div",{style:{fontWeight:800,fontSize:14,color:"#f1f5f9"}},"בטיחות קמפוס"),
          React.createElement("div",{style:{fontSize:10,color:"#334155"}},{admin:"👑 מנהל",viewer:"👁️ צופה",contractor:"🔨 קבלן"}[role])
        )
      ),
      React.createElement("button",{onClick:handleLogout,style:{background:"#1e2d4a",border:"none",color:"#94a3b8",cursor:"pointer",padding:"6px 12px",borderRadius:8,fontSize:12}},"יציאה")
    ),
    React.createElement("div",{style:{maxWidth:640,margin:"0 auto",padding:16}},
      tab==="dashboard"&&React.createElement(Dashboard,{contractors,workers,buildings,onTab:setTab,userRole:role}),
      tab==="buildings"&&React.createElement(Buildings,{buildings,setBuildings:()=>{},canEdit}),
      tab==="workers"&&React.createElement(Workers,{workers,setWorkers,contractors,userRole:role,userContractorId:profile?.contractor_id}),
      tab==="contractors"&&React.createElement(Contractors,{contractors,setContractors,canEdit}),
      tab==="users"&&React.createElement(InviteUsers,{contractors}),
      tab==="spotcheck"&&React.createElement(SpotCheck,{workers,contractors})
    ),
    React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#0d1526",borderTop:"1px solid #1e2d4a",display:"flex",zIndex:100}},
      tabs.map(t=>
        React.createElement("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"10px 4px",background:"none",border:"none",color:tab===t.id?"#60a5fa":"#334155",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:tab===t.id?"2px solid #3b82f6":"2px solid transparent"}},
          React.createElement("span",{style:{fontSize:18}},t.label),
          React.createElement("span",{style:{fontSize:10,fontWeight:tab===t.id?700:400}},t.title)
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
